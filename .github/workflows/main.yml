name: Extract Archive

on:
  push:
    branches:
      - main  # Replace with your branch if different

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Extract archive and replace files
        run: |
          # Extract the archive, overwriting files
          tar -xzvf ReplitExport.tar.gz -C .

      # No commit or push steps
