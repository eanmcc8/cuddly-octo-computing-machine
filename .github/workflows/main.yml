name: Unzip and Commit

on:
  push
  
permissions:
  contents: write  # Grant write permission to push changes

jobs:
  unzip-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Extract ReplitExport.tar.gz
        run: |
          tar -xzvf ReplitExport.tar.gz

      - name: Add extracted files
        run: |
          git add .
          
      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git commit -m "Unzipped ReplitExport.tar.gz contents" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
