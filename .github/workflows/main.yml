name: Extract Archive

on:
  push:
    branches:
      - main

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify archive contents
        run: tar -tzf ReplitExport.tar.gz || unzip -l ReplitExport.zip

      - name: Extract archive
        run: |
          # Remove existing files
          git rm -rf . || true
          
          # Extract archive (adjust if zip)
          tar -xzvf ReplitExport.tar.gz -C .

      - name: List files after extraction
        run: |
          ls -R
