name: Extract Files and Save to Repo

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  extract-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Extract archive into repo folder
        run: |
          unzip -l evm-wallet.zip

      - name: Check extracted files
        run: ls -R

      - name: Add files to Git
        run: |
          git add .
          git commit -m "Add extracted files"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
