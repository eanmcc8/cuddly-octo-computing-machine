name: Extract Archive

on:
  push:
    branches:
      - main

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: List archive contents
        run: tar -tzf ReplitExport.tar.gz

      - name: Extract archive
        run: |
          # Extract archive
          tar -xzvf ReplitExport.tar.gz
          
          # If archive has a top-level folder, move its contents to root
          if [ -d "ReplitExport" ]; then
            mv ReplitExport/* .
            rm -rf ReplitExport
          fi

      - name: List files after extraction
        run: ls -R
