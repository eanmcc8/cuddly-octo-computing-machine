name: Extract Files and Save to Repo

on:
  push:
    branches:
      - main

jobs:
  extract-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify archive contents
        run: tar -tzf ReplitExport.tar.gz

      - name: Extract archive into repo folder
        run: |
          # Extract archive into current directory (repo)
          tar -xzvf ReplitExport.tar.gz
          
          # If archive contains a folder, move its contents to root
          if [ -d "ReplitExport" ]; then
            mv ReplitExport/* .
            rm -rf ReplitExport
          fi

      - name: Check extracted files
        run: ls -R

      - name: Add files to Git
        run: |
          git add .
          git commit -m "Add extracted files"
          
      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
