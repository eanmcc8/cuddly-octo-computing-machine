kind = "web"
previewPath = "/"
title = "EVM Wallet Manager"
version = "1.0.0"
id = "artifacts/evm-wallet"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19801

[services.development]
run = "pnpm --filter @workspace/evm-wallet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/evm-wallet", "run", "build" ]
serve = "static"
publicDir = "artifacts/evm-wallet/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19801"
BASE_PATH = "/"
